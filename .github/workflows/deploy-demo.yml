name: Deploy Demo WordPress

on:
  push:
    branches: [develop, ci/deploy-demo]
  workflow_dispatch:

permissions:
  contents: read

env:
  DEMO_DOMAIN: wordpress-qa.axept.io
  PLUGIN_SLUG: axeptio-sdk-integration

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Enable Corepack
        run: corepack enable

      - name: Install Node dependencies
        run: yarn install --immutable

      - name: Build production assets
        run: yarn build:production

      - name: Setup PHP
        uses: shivammathur/setup-php@2.37.0
        with:
          php-version: '8.3'

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --optimize-autoloader

      - name: Create plugin zip
        run: |
          mkdir -p /tmp/plugin-build/${{ env.PLUGIN_SLUG }}
          rsync -av --exclude-from=.distignore ./ /tmp/plugin-build/${{ env.PLUGIN_SLUG }}/
          cd /tmp/plugin-build
          zip -qr /tmp/plugin.zip ${{ env.PLUGIN_SLUG }}/

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-build
          path: /tmp/plugin.zip
          retention-days: 1

  deploy:
    name: Trigger Deploy via Webhook
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-build
          path: /tmp

      - name: Upload plugin zip to server
        run: |
          # Upload the zip via a simple HTTP PUT to the webhook endpoint
          ARTIFACT_URL="https://${{ env.DEMO_DOMAIN }}/deploy-artifact.php"
          SIGNATURE="sha256=$(echo -n "@/tmp/plugin.zip" | openssl dgst -sha256 -hmac "${{ secrets.DEMO_WEBHOOK_SECRET }}" | awk '{print $2}')"

          curl -sk --fail \
            -X PUT \
            -H "X-Webhook-Signature: ${SIGNATURE}" \
            --data-binary @/tmp/plugin.zip \
            "${ARTIFACT_URL}"

      - name: Trigger deployment
        run: |
          PAYLOAD='{"artifact_url":"local:///opt/deploy/plugin.zip","github_token":""}'
          SIGNATURE="sha256=$(echo -n "${PAYLOAD}" | openssl dgst -sha256 -hmac "${{ secrets.DEMO_WEBHOOK_SECRET }}" | awk '{print $2}')"

          HTTP_STATUS=$(curl -sk -o /tmp/webhook-response.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Signature: ${SIGNATURE}" \
            -d "${PAYLOAD}" \
            "https://${{ env.DEMO_DOMAIN }}/deploy-webhook.php")

          cat /tmp/webhook-response.txt
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "❌ Webhook returned HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "✅ Deployment triggered"

      - name: Wait for deployment
        run: sleep 30

      - name: Verify deployment
        run: |
          HTTP_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "https://${{ env.DEMO_DOMAIN }}")
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
            echo "✅ Demo site responding with HTTP $HTTP_STATUS"
          else
            echo "❌ Demo site returned HTTP $HTTP_STATUS"
            exit 1
          fi
