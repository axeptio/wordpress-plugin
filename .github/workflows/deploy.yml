name: Deploy to WordPress.org

on:
  push:
    tags:
      - '*'
  # Manual trigger for testing. Note: dry-run on a branch won't perfectly simulate
  # a tag-based deploy since 10up action derives version from the git tag.
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (no SVN commit)'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Run JS lint
        run: yarn lint

      - name: Run JS tests
        run: yarn test

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      - name: Install Composer dependencies (with dev tools)
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPCS
        run: composer lint

      - name: Run PHP unit tests
        run: composer test

  deploy:
    name: Deploy Plugin
    runs-on: ubuntu-latest
    needs: lint-and-test
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Build assets
        run: yarn build:production

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --optimize-autoloader

      - name: WordPress Plugin Deploy
        id: deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          generate-zip: true
          dry-run: ${{ inputs.dry-run || false }}
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: axeptio-wordpress-plugin

      - name: Create GitHub Release
        if: ${{ !inputs.dry-run && github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.deploy.outputs.zip-path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
